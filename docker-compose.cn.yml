# 国内镜像加速版（与 docker-compose.yml 行为一致，仅基础镜像不同）

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.cn
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - genbi-network

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend.cn
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/genbi?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      - mysql
      - redis
    networks:
      - genbi-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - genbi-network

  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=genbi
    volumes:
      - mysql-data-cn:/var/lib/mysql
    networks:
      - genbi-network
    command: --default-authentication-plugin=mysql_native_password

networks:
  genbi-network:
    driver: bridge

volumes:
  mysql-data-cn:
