name: Frontend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'

jobs:
  lint-and-test:
    name: 代码检查和测试
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v3
      
      - name: 设置 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: 安装依赖
        working-directory: ./frontend
        run: npm ci
      
      - name: ESLint 检查
        working-directory: ./frontend
        run: npm run lint:js
      
      - name: Prettier 检查
        working-directory: ./frontend
        run: npm run lint:prettier
      
      - name: TypeScript 类型检查
        working-directory: ./frontend
        run: npm run tsc
      
      - name: 运行测试（如果有）
        working-directory: ./frontend
        run: npm run test || echo "No tests configured"
        continue-on-error: true
  
  build:
    name: 构建项目
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v3
      
      - name: 设置 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: 安装依赖
        working-directory: ./frontend
        run: npm ci
      
      - name: 构建项目
        working-directory: ./frontend
        run: npm run build
      
      - name: 上传构建产物
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: frontend/dist
          retention-days: 7
  
  docker:
    name: 构建 Docker 镜像
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v3
      
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      # 如果需要推送到 Docker Hub，取消注释以下步骤
      # - name: 登录 Docker Hub
      #   uses: docker/login-action@v2
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: 构建 Docker 镜像
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: false  # 改为 true 以推送到 Docker Hub
          tags: |
            genbi-frontend:latest
            genbi-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
